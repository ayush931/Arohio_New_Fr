<!doctype html>
<html lang="en" class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Arohio — AI-Powered Accessibility & Automation</title>
    <meta name="description" content="Arohio brings AI-powered accessibility and automation to your site—SEO audits, WCAG checks, and smart fixes in one simple toolkit." />
    <meta name="robots" content="index,follow" />
    <meta name="color-scheme" content="light dark" />
    <!-- Brand theme colors -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2EC4B6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1BA3A2" />

    <!-- Canonical -->
    <link rel="canonical" href="https://arohio.com/" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Arohio" />
    <meta property="og:title" content="Arohio — AI-Powered Accessibility & Automation" />
    <meta property="og:description" content="AI toolkit for accessibility, automation, and SEO." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arohio.com/" />
    <meta property="og:image" content="/og-arohio.jpg" />
    <meta property="og:image:alt" content="Arohio product preview" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arohio — AI-Powered Accessibility & Automation" />
    <meta name="twitter:description" content="AI toolkit for accessibility, automation, and SEO." />
    <meta name="twitter:image" content="/og-arohio.jpg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Arohio",
        "url": "https://arohio.com/",
        "logo": "https://arohio.com/favicon.svg",
        "sameAs": [
          "https://twitter.com/your-handle",
          "https://www.linkedin.com/company/your-handle",
          "https://github.com/your-handle"
        ]
      }
    </script>
  </head>
  <body>
    <noscript>
      <strong>Arohio requires JavaScript to run properly. Please enable it to continue.</strong>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
